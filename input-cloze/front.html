<div class="cloze-shell input-cloze-shell">
  <div class="input-cloze-raw" hidden>{{Text}}</div>
  <div class="input-cloze-feedback" hidden>{{cloze:Text}}</div>
  <div class="cloze-body input-cloze-body">{{cloze:Text}}</div>
</div>

<script>
(() => {
  const rawSource = document.querySelector(".input-cloze-raw");
  const frontBody = document.querySelector(".input-cloze-body");
  if (!rawSource || !frontBody) {
    return;
  }

  const rawHtml = rawSource.innerHTML;
  const renderedText = (frontBody.textContent || "").replace(/\s+/g, " ").trim();
  const renderedBlankCount = frontBody.querySelectorAll(".cloze").length;
  const tokenPattern = /\{\{c(\d+)::([\s\S]*?)(?:::(.*?))?\}\}/g;
  const tokens = [];
  let match;

  while ((match = tokenPattern.exec(rawHtml)) !== null) {
    tokens.push({
      full: match[0],
      index: Number(match[1]),
      answerHtml: match[2],
      hint: match[3] || "",
    });
  }

  if (!tokens.length || !renderedBlankCount) {
    return;
  }

  const uniqueIndexes = [...new Set(tokens.map((token) => token.index))];
  const toVisibleText = (html) => {
    const element = document.createElement("div");
    element.innerHTML = html;
    return (element.textContent || "").replace(/\s+/g, " ").trim();
  };

  const renderCandidateHtml = (activeIndex) =>
    rawHtml.replace(tokenPattern, (_, index, answerHtml, hint) => {
      if (Number(index) === activeIndex) {
        return `<span class="cloze">${hint || "[...]"}</span>`;
      }
      return answerHtml;
    });

  let activeIndex = null;
  for (const candidateIndex of uniqueIndexes) {
    const candidateBlankCount = tokens.filter((token) => token.index === candidateIndex).length;
    if (candidateBlankCount !== renderedBlankCount) {
      continue;
    }
    const candidateText = toVisibleText(renderCandidateHtml(candidateIndex));
    if (candidateText === renderedText) {
      activeIndex = candidateIndex;
      break;
    }
  }

  if (activeIndex === null) {
    return;
  }

  const promptKey = `${rawHtml}::${activeIndex}`;
  const storageKey = `input-cloze:${document.location.pathname}:${promptKey}`;

  const loadValues = () => {
    try {
      return JSON.parse(sessionStorage.getItem(storageKey) || "[]");
    } catch (error) {
      return Array.isArray(window.__inputClozeValues) ? window.__inputClozeValues : [];
    }
  };

  const saveValues = (values) => {
    try {
      sessionStorage.setItem(storageKey, JSON.stringify(values));
    } catch (error) {
      window.__inputClozeValues = values;
    }
  };

  const values = loadValues();
  const blanks = Array.from(frontBody.querySelectorAll(".cloze"));
  blanks.forEach((blank, idx) => {
    const input = document.createElement("input");
    const placeholder = (blank.textContent || "").trim();
    input.type = "text";
    input.className = "input-cloze-field";
    input.autocomplete = "off";
    input.spellcheck = false;
    input.placeholder = placeholder;
    input.setAttribute("aria-label", `填空 ${idx + 1}`);
    input.value = typeof values[idx] === "string" ? values[idx] : "";
    input.style.width = `${Math.max(4, Math.min(24, placeholder.length + 2 || 6))}ch`;

    input.addEventListener("input", () => {
      const nextValues = blanks.map((_, blankIdx) => {
        const element = document.querySelector(`.input-cloze-field[data-blank-index="${blankIdx}"]`);
        return element ? element.value : "";
      });
      saveValues(nextValues);
    });

    input.dataset.blankIndex = String(idx);
    blank.replaceWith(input);
  });

  const firstInput = document.querySelector(".input-cloze-field");
  if (firstInput) {
    firstInput.focus();
  }
})();
</script>
